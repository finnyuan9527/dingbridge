services:
  app:
    build: .
    container_name: dingbridge-app
    restart: always
    ports:
      # 映射到宿主机的 8001 端口，避免与现有 8000 端口冲突
      - "8001:8000"
    # 指定使用生产环境配置文件
    env_file:
      - .env.prod
    depends_on:
      redis:
        condition: service_healthy
    # 健康检查，确保应用存活
    healthcheck:
      # 使用 Python 内置库检查 /healthz 接口，无需额外安装 curl
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: dingbridge-redis
    restart: always
    # 不暴露端口到宿主机，仅通过 Docker 内部网络访问
    # 使用 .env.prod 中的密码变量
    command: redis-server --requirepass ${REDIS__PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS__PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
