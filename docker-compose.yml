services:
  app:
    image: ${DINGBRIDGE_IMAGE:?Set DINGBRIDGE_IMAGE in .env or the shell environment}
    container_name: dingbridge-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - dingbridge_data:/data
    depends_on:
      - redis
    environment:
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - REDIS__PASSWORD=${REDIS__PASSWORD:-dingbridge_redis_password}

  redis:
    image: redis:7-alpine
    container_name: dingbridge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS__PASSWORD:-dingbridge_redis_password}
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  dingbridge_data:
